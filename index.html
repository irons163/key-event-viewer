<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keyboard Event Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Keyboard Event Viewer</h1>
    <p class="subtitle">Inspect <code>keydown</code> / <code>keypress</code> / <code>keyup</code>, input and composition events.</p>
    <p class="ua">UserAgent: <span id="useragent"></span></p>
  </header>

  <section class="inputrow">
    <label for="input"><code>input</code> element with <code>type="text"</code>:</label>
    <input id="input" type="text" size="80" autocomplete="off" autofocus />
  </section>

  <section class="controls">
    <button id="resetTable" type="button">Clear Table</button>
    <button id="optionsToggle" type="button" aria-expanded="false">Show Options</button>
  </section>

  <div id="options" hidden></div>

  <div class="tablewrap">
    <table id="output"></table>
  </div>

  <script src="app.js"></script>
</body>
</html>
